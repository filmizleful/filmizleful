<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oda - Filmizleful</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0c0c14;
    color:white;
}

/* ÜST BAR */
.ust{
    background:#111;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
}

.logo{
    color:#e50914;
    font-size:22px;
    font-weight:bold;
}

/* ANA ALAN */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* VİDEO */
.video-alan{
    flex:3;
    display:flex;
    flex-direction:column;
    padding:20px;
}

.video-kutu{
    flex:1;
    background:black;
    border-radius:12px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* CHAT */
.chat{
    flex:1;
    background:#111;
    display:flex;
    flex-direction:column;
}

.mesajlar{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.mesaj{
    margin-bottom:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:8px;
}

.input{
    display:flex;
}

.input input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

.input button{
    background:#e50914;
    color:white;
    border:none;
    padding:10px;
}

/* ÜST VİDEO KONTROL */
.kontrol{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.kontrol input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

.kontrol button{
    padding:10px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="ust">
    <div class="logo">🎬 Filmizleful Oda</div>
</div>

<div class="container">

    <!-- VİDEO -->
    <div class="video-alan">

        <div class="kontrol">
            <input type="text" id="videoInput" placeholder="YouTube link">
            <button onclick="videoDegistir()">Değiştir</button>
        </div>

        <div class="video-kutu">
            <iframe id="video"></iframe>
        </div>

    </div>

    <!-- CHAT -->
    <div class="chat">

        <div class="mesajlar" id="mesajlar"></div>

        <div class="input">
            <input id="mesajInput" placeholder="Mesaj yaz">
            <button onclick="mesajGonder()">Gönder</button>
        </div>

    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const oda = urlParams.get("oda");

const videoRef = doc(db, "rooms", oda);

/* VİDEO ÇEK */
onSnapshot(videoRef, (docSnap)=>{
    if(docSnap.exists()){
        document.getElementById("video").src = docSnap.data().url;
    }
});

/* VIDEO DEGISTIR */
window.videoDegistir = async function(){
    let link = document.getElementById("videoInput").value;
    let id = link.split("v=")[1];

    await setDoc(videoRef,{
        url:"https://www.youtube.com/embed/"+id
    });
}

/* CHAT */
const mesajRef = collection(db,"rooms",oda,"mesajlar");

onSnapshot(mesajRef,(snap)=>{
    let html="";
    snap.forEach(doc=>{
        html+=`<div class="mesaj">${doc.data().text}</div>`;
    });
    document.getElementById("mesajlar").innerHTML = html;
});

window.mesajGonder = async function(){
    let text = document.getElementById("mesajInput").value;

    await addDoc(mesajRef,{
        text:text
    });

    document.getElementById("mesajInput").value="";
}
</script>

</body>
</html>

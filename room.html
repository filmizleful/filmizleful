<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Oda</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f1a;
    color:white;
}

.ust{
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#e50914;
    font-size:22px;
    font-weight:bold;
}

.btn{
    background:#e50914;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    padding:20px;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

.video{
    background:black;
    height:300px;
}

.chat{
    background:#1a1a2b;
    padding:10px;
    height:300px;
    overflow:auto;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="ust">
    <div class="logo">🎬 Filmizleful Oda</div>
    <button class="btn" onclick="linkKopyala()">Link Kopyala</button>
</div>

<div style="padding:20px;">
    <button class="btn" onclick="gorus()">🎥 Görüşmeye Katıl</button>
</div>

<div class="container">

    <div>
        <h3>🎬 Ortak Video</h3>
        <input id="videoInput" placeholder="YouTube link yapıştır">
        <button class="btn" onclick="videoAyarla()">Video Aç</button>

        <div class="video">
            <iframe id="videoFrame" width="100%" height="100%" allowfullscreen></iframe>
        </div>
    </div>

    <div>
        <h3>💬 Chat</h3>
        <div class="chat" id="chat"></div>
        <input id="mesaj" placeholder="Mesaj yaz...">
        <button class="btn" onclick="gonder()">Gönder</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const oda = params.get("oda") || "genel";

window.gorus = function(){
    window.open("https://meet.jit.si/filmizleful_" + oda);
};

window.videoAyarla = function(){
    let link = document.getElementById("videoInput").value;

    let id = "";

    if(link.includes("youtu.be/")){
        id = link.split("youtu.be/")[1];
    }else if(link.includes("watch?v=")){
        id = link.split("v=")[1];
    }

    document.getElementById("videoFrame").src =
    "https://www.youtube.com/embed/" + id;
};

window.gonder = async function(){
    let mesaj = document.getElementById("mesaj").value;

    await addDoc(collection(db, "chat_"+oda), {
        mesaj: mesaj
    });

    document.getElementById("mesaj").value = "";
};

onSnapshot(collection(db, "chat_"+oda), (snap)=>{
    let html = "";
    snap.forEach(doc=>{
        html += "<div>"+doc.data().mesaj+"</div>";
    });
    document.getElementById("chat").innerHTML = html;
});

window.linkKopyala = function(){
    navigator.clipboard.writeText(window.location.href);
    alert("Link kopyalandı");
};
</script>

</body>
</html>

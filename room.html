<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oda Chat + Video</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0c0c14;
    color:white;
}

.ust{
    background:#111;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.ust a{
    color:white;
    text-decoration:none;
    background:#2a2a2a;
    padding:10px 14px;
    border-radius:10px;
}

.sayfa{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.video-kutu{
    background:#151515;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
}

.video-baslik{
    font-size:24px;
    font-weight:bold;
    margin-bottom:14px;
}

.video-kontrol{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
}

.video-kontrol input{
    flex:1;
    min-width:260px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

.video-kontrol button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.video-kontrol button:hover{
    background:#ff1e2d;
}

.oynatici{
    width:100%;
    aspect-ratio:16 / 9;
    border-radius:14px;
    overflow:hidden;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.oynatici iframe{
    width:100%;
    height:100%;
    border:0;
}

.video-bos{
    color:#bbb;
    text-align:center;
    padding:20px;
    line-height:1.6;
}

.chat{
    background:#151515;
    border-radius:18px;
    padding:18px;
}

.mesajlar{
    height:350px;
    overflow-y:auto;
    background:#1a1a1a;
    padding:15px;
    border-radius:15px;
}

.mesaj{
    margin-bottom:10px;
    line-height:1.5;
}

.input{
    margin-top:12px;
    display:flex;
    gap:10px;
}

.input input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}

.input button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.input button:hover{
    background:#ff1e2d;
}

.uyari{
    margin-top:10px;
    color:#ff9a9a;
    font-size:14px;
}
</style>
</head>
<body>

<div class="ust">
    <div id="odaAdi">Oda</div>
    <a href="rooms.html">← Geri</a>
</div>

<div class="sayfa">

    <div class="video-kutu">
        <div class="video-baslik">📺 Ortak Video</div>

        <div class="video-kontrol">
            <input id="videoLink" placeholder="YouTube linki yapıştır...">
            <button onclick="videoAyarla()">Videoyu Değiştir</button>
        </div>

        <div class="uyari" id="videoUyari"></div>

        <div class="oynatici" id="oynaticiAlan">
            <div class="video-bos" id="videoBosYazi">
                Henüz video seçilmedi.<br>
                YouTube linki yapıştırıp "Videoyu Değiştir" butonuna bas.
            </div>
            <iframe id="videoFrame" allowfullscreen style="display:none;"></iframe>
        </div>
    </div>

    <div class="chat">
        <div class="video-baslik">💬 Oda Sohbeti</div>

        <div class="mesajlar" id="mesajlar"></div>

        <div class="input">
            <input id="mesajInput" placeholder="Mesaj yaz...">
            <button onclick="gonder()">Gönder</button>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const oda = params.get("oda") || "genel";
let isim = localStorage.getItem("filmizleful_isim") || "Misafir";

document.getElementById("odaAdi").textContent = "📺 Oda: " + oda;

const mesajlarDiv = document.getElementById("mesajlar");
const videoFrame = document.getElementById("videoFrame");
const videoInput = document.getElementById("videoLink");
const videoBosYazi = document.getElementById("videoBosYazi");
const videoUyari = document.getElementById("videoUyari");

/* CHAT */
const q = query(collection(db, "rooms", oda, "messages"), orderBy("tarih"));

onSnapshot(q, (snapshot) => {
    mesajlarDiv.innerHTML = "";
    snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "mesaj";
        div.innerHTML = "<b>" + data.isim + ":</b> " + data.mesaj;
        mesajlarDiv.appendChild(div);
    });
    mesajlarDiv.scrollTop = mesajlarDiv.scrollHeight;
});

window.gonder = async function() {
    const input = document.getElementById("mesajInput");
    const text = input.value.trim();
    if (!text) return;

    await addDoc(collection(db, "rooms", oda, "messages"), {
        isim: isim,
        mesaj: text,
        tarih: Date.now()
    });

    input.value = "";
};

/* VIDEO */
function youtubeEmbedYap(link) {
    try {
        if (link.includes("youtube.com/watch?v=")) {
            const url = new URL(link);
            const id = url.searchParams.get("v");
            if (id) return "https://www.youtube.com/embed/" + id;
        }

        if (link.includes("youtu.be/")) {
            const parcalar = link.split("youtu.be/");
            const id = parcalar[1]?.split("?")[0];
            if (id) return "https://www.youtube.com/embed/" + id;
        }

        if (link.includes("youtube.com/embed/")) {
            return link;
        }

        return "";
    } catch {
        return "";
    }
}

function videoGoster(src) {
    if (src) {
        videoFrame.src = src;
        videoFrame.style.display = "block";
        videoBosYazi.style.display = "none";
    } else {
        videoFrame.src = "";
        videoFrame.style.display = "none";
        videoBosYazi.style.display = "block";
    }
}

const roomDocRef = doc(db, "rooms", oda);

async function odaBelgesiKontrolEt() {
    const snap = await getDoc(roomDocRef);
    if (!snap.exists()) {
        await setDoc(roomDocRef, {
            video: ""
        });
    }
}

await odaBelgesiKontrolEt();

onSnapshot(roomDocRef, (snap) => {
    const data = snap.data();
    if (data && typeof data.video !== "undefined") {
        videoGoster(data.video);
    } else {
        videoGoster("");
    }
});

window.videoAyarla = async function() {
    const link = videoInput.value.trim();
    const embed = youtubeEmbedYap(link);

    if (!embed) {
        videoUyari.textContent = "Geçerli bir YouTube linki yapıştır.";
        return;
    }

    videoUyari.textContent = "";

    await setDoc(roomDocRef, { video: embed }, { merge: true });
    videoInput.value = "";
};
</script>

</body>
</html>

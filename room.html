<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Filmizleful Oda</title>

<style>
body{
    background:#0c0c14;
    color:white;
    font-family:Arial;
    text-align:center;
}

.video{
    width:90%;
    max-width:900px;
    margin:20px auto;
    aspect-ratio:16/9;
    border-radius:18px;
    overflow:hidden;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

input{
    padding:10px;
    width:60%;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎬 Ortak Video</h1>

<input id="link" placeholder="YouTube link yapıştır">
<button onclick="degistir()">Değiştir</button>

<div class="video">
<iframe id="oynatici" src="" allowfullscreen></iframe>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// oda ismi
const url = new URL(window.location.href);
const oda = url.searchParams.get("oda") || "genel";

// video değiştir
window.degistir = async function(){
    let link = document.getElementById("link").value;

    let id = link.split("v=")[1];
    if(id.includes("&")) id = id.split("&")[0];

    let embed = "https://www.youtube.com/embed/" + id;

    await setDoc(doc(db, "odalar", oda), {
        video: embed
    });
}

// herkese anlık yansıt
onSnapshot(doc(db, "odalar", oda), (docSnap) => {
    if(docSnap.exists()){
        document.getElementById("oynatici").src = docSnap.data().video;
    }
});
</script>

</body>
</html>

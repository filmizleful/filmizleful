<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oda - Filmizleful</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#1b1b2f,#09090f 70%);
    color:white;
}
.ust{
    background:#111;
    padding:16px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}
.logo{
    font-size:26px;
    font-weight:bold;
    color:#e50914;
}
.icerik{
    max-width:1000px;
    margin:0 auto;
    padding:30px 20px;
}
.kutu{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:24px;
}
h1{
    margin-top:0;
}
.satir{
    margin-top:12px;
    color:#ddd;
    font-size:18px;
}
.butonlar{
    margin-top:24px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}
a, button{
    text-decoration:none;
    border:none;
    background:#e50914;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}
a:hover, button:hover{
    background:#ff1e2d;
}
</style>
</head>
<body>

<div class="ust">
    <div class="logo">🎬 Filmizleful Oda</div>
    <a href="rooms.html">← Odalara Dön</a>
</div>

<div class="icerik">
    <div class="kutu">
        <h1 id="odaBaslik">Oda</h1>
        <div class="satir" id="isimYazi"></div>
        <div class="satir">Bu ilk sürüm. Sonraki adımda yazılı chat ekleyeceğiz.</div>

        <div class="butonlar">
            <button onclick="isimDegistir()">İsmi Değiştir</button>
        </div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const oda = params.get("oda") || "genel";
let isim = localStorage.getItem("filmizleful_isim") || "Misafir";

document.getElementById("odaBaslik").textContent = "📺 Oda: " + oda;
document.getElementById("isimYazi").textContent = "Katılan kişi: " + isim;

function isimDegistir() {
    const yeniIsim = prompt("Yeni ismini yaz:", isim);
    if (yeniIsim && yeniIsim.trim()) {
        isim = yeniIsim.trim();
        localStorage.setItem("filmizleful_isim", isim);
        document.getElementById("isimYazi").textContent = "Katılan kişi: " + isim;
    }
}
</script>

</body>
</html>

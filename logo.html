<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Filmizleful Logo</title>

<style>
body{
    margin:0;
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.logo{
    font-size:32px;
    font-weight:900;
    font-family:Arial, sans-serif;
    background:linear-gradient(90deg,#ff6d7a,#ffb58b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    display:flex;
    align-items:center;
    gap:10px;
}

.logo span{
    font-size:28px;
}
</style>
</head>
<body>

<div class="logo">
    🎬 Filmizleful
</div>

</body>
</html>

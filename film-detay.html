<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Detayı - Filmizleful</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top, #1d1a33 0%, #0b0b14 55%, #000 100%);
    color:white;
}

.ustbar{
    background:rgba(10,10,16,0.95);
    padding:18px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    color:#ff6d7a;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.menu a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:10px;
    transition:0.3s;
    font-weight:bold;
}

.menu a:hover{
    background:#1f1f2d;
}

.avatar-ust{
    background:#ff6b81;
    padding:8px 14px;
    border-radius:20px;
    font-size:14px;
    color:white;
    font-weight:bold;
    display:inline-block;
    white-space:nowrap;
}

.detay-alan{
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
}

.detay-kutu{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:28px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.detay-sol{
    flex:1;
    min-width:280px;
    max-width:360px;
}

.detay-sol img{
    width:100%;
    border-radius:20px;
    display:block;
    object-fit:cover;
}

.detay-sag{
    flex:2;
    min-width:280px;
}

.detay-baslik{
    font-size:42px;
    margin:0 0 10px;
}

.detay-bilgi{
    font-size:18px;
    color:#d8d8e8;
    margin-bottom:12px;
}

.detay-puan{
    font-size:18px;
    color:#ffe3a8;
    font-weight:bold;
    margin-bottom:18px;
}

.detay-aciklama{
    color:#f1f1f7;
    line-height:1.7;
    font-size:17px;
    margin-bottom:24px;
}

.detay-butonlar{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

.detay-buton{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(90deg,#ffb58b,#ff7588);
    color:white;
    padding:14px 24px;
    border-radius:14px;
    font-weight:bold;
    transition:0.3s;
    border:none;
    cursor:pointer;
}

.detay-buton:hover{
    transform:scale(1.04);
}

.detay-buton.geri{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
}

.detay-puan-alani{
    margin-top:8px;
    background:rgba(255,255,255,0.04);
    padding:16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
    max-width:360px;
}

.puan-baslik{
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}

.puan-yildiz{
    font-size:28px;
    cursor:pointer;
    margin-right:4px;
    transition:0.2s;
}

.puan-yildiz:hover{
    transform:scale(1.12);
}

#detayPuanYazi{
    margin-top:10px;
    color:#ffdca8;
    font-size:15px;
}

.alt{
    text-align:center;
    color:#9ea0b8;
    padding:24px;
    border-top:1px solid rgba(255,255,255,0.06);
    margin-top:30px;
}

@media(max-width:800px){
    .detay-baslik{
        font-size:32px;
    }

    .detay-kutu{
        padding:18px;
    }
}
</style>
</head>
<body>

<div class="ustbar">
    <div class="logo">🎬 Filmizleful</div>

    <div class="menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="korku.html">Korku</a>
        <a href="aksiyon.html">Aksiyon</a>
        <a href="bilimkurgu.html">Bilim Kurgu</a>
        <a href="macera.html">Macera</a>
        <a href="vip.html">👑 VIP</a>
        <a href="giris.html">👤 Giriş</a>
        <div class="avatar-ust" id="kullaniciYazi">😎 Misafir</div>
    </div>
</div>

<div class="detay-alan">
    <div class="detay-kutu">
        <div class="detay-sol">
            <img id="filmResim" src="" alt="Film Afişi">
        </div>

        <div class="detay-sag">
            <h1 class="detay-baslik" id="filmAd">Film Yükleniyor...</h1>
            <div class="detay-bilgi" id="filmBilgi">Kategori • Yıl</div>
            <div class="detay-puan" id="filmImdb">⭐ IMDb</div>
            <div class="detay-aciklama" id="filmAciklama">
                Film açıklaması yükleniyor...
            </div>

            <div class="detay-butonlar">
                <button class="detay-buton" onclick="izleMesaj()">▶ İzle</button>
                <a href="index.html" class="detay-buton geri">← Ana Sayfaya Dön</a>
            </div>

            <div class="detay-puan-alani">
                <div class="puan-baslik">Sen de puan ver</div>
                <div>
                    <span class="puan-yildiz" onclick="detayPuanVer(1)">⭐</span>
                    <span class="puan-yildiz" onclick="detayPuanVer(2)">⭐</span>
                    <span class="puan-yildiz" onclick="detayPuanVer(3)">⭐</span>
                    <span class="puan-yildiz" onclick="detayPuanVer(4)">⭐</span>
                    <span class="puan-yildiz" onclick="detayPuanVer(5)">⭐</span>
                </div>
                <div id="detayPuanYazi">Senin puanın: Yok</div>
            </div>
        </div>
    </div>
</div>

<div class="alt">
    © 2026 Filmizleful
</div>

<script>
const filmler = {
    "john-wick": {
        ad: "John Wick",
        kategori: "Aksiyon",
        yil: "2014",
        imdb: "7.4",
        resim: "https://image.tmdb.org/t/p/w500/fZPSd91yGE9fCcCe6OoQr6E3Bev.jpg",
        aciklama: "Eski bir tetikçi olan John Wick, sakin hayatına geri dönmeye çalışırken beklenmedik bir saldırıyla yeniden karanlık dünyanın içine çekilir. Tempolu sahneleri ve stil sahibi aksiyonu ile öne çıkar."
    },
    "batman": {
        ad: "Batman",
        kategori: "Aksiyon",
        yil: "2022",
        imdb: "7.8",
        resim: "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg",
        aciklama: "Gotham şehri yeni bir tehdit altındayken Batman karanlık bir bilmece zincirini çözmeye çalışır. Suç, gizem ve aksiyonu bir araya getiren güçlü bir yapım."
    },
    "mad-max": {
        ad: "Mad Max",
        kategori: "Aksiyon",
        yil: "2015",
        imdb: "8.1",
        resim: "https://image.tmdb.org/t/p/w500/8tZYtuWezp8JbcsvHYO0O46tFbo.jpg",
        aciklama: "Çölün ortasında hayatta kalma mücadelesi veren karakterler, nefes kesen kovalamacalar ve sert bir dünyanın içinde özgürlük için savaşır."
    },
    "interstellar": {
        ad: "Interstellar",
        kategori: "Bilim Kurgu",
        yil: "2014",
        imdb: "8.7",
        resim: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",
        aciklama: "İnsanlığın geleceği tehlikedeyken bir grup astronot, yeni yaşanabilir dünyalar bulmak için uzayın derinliklerine doğru büyük bir yolculuğa çıkar."
    },
    "the-conjuring": {
        ad: "The Conjuring",
        kategori: "Korku",
        yil: "2013",
        imdb: "7.5",
        resim: "https://image.tmdb.org/t/p/w500/wVYREutTvI2tmxr6ujrHT704wGF.jpg",
        aciklama: "Doğaüstü olaylarla baş etmeye çalışan bir aile, ünlü paranormal araştırmacılardan yardım ister. Gerilimli atmosferiyle dikkat çeken korku filmi."
    },
    "avatar": {
        ad: "Avatar",
        kategori: "Macera",
        yil: "2009",
        imdb: "7.9",
        resim: "https://image.tmdb.org/t/p/w500/kyeqWdyUXW608qlYkRqosgbbJyK.jpg",
        aciklama: "Pandora gezegeninde geçen bu büyük macera, görsel dünyası ve etkileyici atmosferiyle izleyiciyi farklı bir evrene taşır."
    }
};

function aktifFilmIdAl(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id") || "john-wick";
}

function filmiYukle(){
    const filmId = aktifFilmIdAl();
    const film = filmler[filmId];

    if(!film){
        document.getElementById("filmAd").innerText = "Film bulunamadı";
        document.getElementById("filmBilgi").innerText = "";
        document.getElementById("filmImdb").innerText = "";
        document.getElementById("filmAciklama").innerText = "Bu film için detay bulunamadı.";
        document.getElementById("filmResim").src = "";
        return;
    }

    document.title = film.ad + " - Filmizleful";
    document.getElementById("filmAd").innerText = film.ad;
    document.getElementById("filmBilgi").innerText = film.kategori + " • " + film.yil;
    document.getElementById("filmImdb").innerText = "⭐ IMDb " + film.imdb;
    document.getElementById("filmAciklama").innerText = film.aciklama;
    document.getElementById("filmResim").src = film.resim;
    document.getElementById("filmResim").alt = film.ad + " Afişi";
}

function detayPuanVer(puan){
    const filmId = aktifFilmIdAl();
    localStorage.setItem("puan_" + filmId, puan);
    detayPuanGoster();
}

function detayPuanGoster(){
    const filmId = aktifFilmIdAl();
    const puan = localStorage.getItem("puan_" + filmId);
    const alan = document.getElementById("detayPuanYazi");

    if(puan){
        alan.innerText = "Senin puanın: " + puan + "/5";
    }else{
        alan.innerText = "Senin puanın: Yok";
    }
}

function izleMesaj(){
    alert("Şimdilik izleme butonu hazır. Sonra buraya film linki veya oynatıcı ekleyebiliriz.");
}

let ad = localStorage.getItem("kullanici");
if(ad){
    document.getElementById("kullaniciYazi").innerText = "👤 " + ad;
}

window.addEventListener("load", function(){
    filmiYukle();
    detayPuanGoster();
});
</script>

</body>
</html>
